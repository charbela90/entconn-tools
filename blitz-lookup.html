<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Service Lookup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap');

:root {
  --blue: #2563EB;
  --orange: #F59E0B;
  --dark: #1e293b;
  --mid: #475569;
  --light: #94a3b8;
  --bg: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --success: #10b981;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

/* ── Header ── */
.app-header {
  background: var(--white);
  border-bottom: 3px solid var(--blue);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.app-header-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #1e3a5f, var(--blue));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.app-header-text h1 { font-size: 20px; font-weight: 800; color: var(--dark); }
.app-header-text p  { font-size: 13px; color: var(--mid); }

.container { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }

/* ── Upload ── */
.upload-card {
  background: var(--white);
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.upload-card:hover, .upload-card.drag { border-color: var(--blue); background: #eff6ff; }
.upload-card input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-card .icon { font-size: 52px; margin-bottom: 16px; }
.upload-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.upload-card p  { color: var(--mid); font-size: 14px; margin-bottom: 24px; }
.btn-primary {
  display: inline-block; padding: 12px 32px;
  background: var(--blue); color: white; border-radius: 8px;
  font-weight: 700; font-size: 15px; border: none; cursor: pointer;
  font-family: inherit; transition: all 0.2s; pointer-events: none;
}
.upload-card:hover .btn-primary { background: #1d4ed8; }

/* ── File pill ── */
.file-pill {
  display: flex; align-items: center; gap: 10px;
  background: #eff6ff; border: 1px solid #bfdbfe;
  border-radius: 8px; padding: 10px 16px; margin-bottom: 24px;
}
.file-pill .filename { font-weight: 700; font-size: 14px; color: var(--blue); }
.file-pill .fileinfo { font-size: 13px; color: var(--mid); }
.btn-reset {
  background: none; border: 1px solid var(--border); color: var(--mid);
  padding: 6px 14px; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 13px; margin-left: auto;
}
.btn-reset:hover { border-color: var(--danger); color: var(--danger); }

/* ── Error ── */
.error-msg {
  background: #fef2f2; border: 1px solid #fecaca;
  color: var(--danger); padding: 14px 20px;
  border-radius: 8px; font-size: 14px; margin-top: 16px; display: none;
}

/* ── Search panel ── */
#search-panel { display: none; }

.config-section {
  background: var(--white); border-radius: 12px;
  border: 1px solid var(--border); margin-bottom: 24px; overflow: visible;
}
.config-section-header {
  padding: 16px 20px; background: #f8fafc;
  border-bottom: 1px solid var(--border); border-radius: 12px 12px 0 0;
  font-weight: 700; font-size: 15px;
  display: flex; align-items: center; gap: 10px;
}
.config-section-header .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--blue); flex-shrink: 0;
}
.config-body { padding: 20px; }

/* ── Search grid: 5 columns for 5 fields ── */
.search-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

.form-group { position: relative; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700; color: var(--mid);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
}
.search-input-wrap { position: relative; }
.s-icon {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  font-size: 13px; pointer-events: none; color: var(--light);
}
.form-group input {
  width: 100%; padding: 9px 28px 9px 30px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: inherit; font-size: 13px; color: var(--dark);
  background: white; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.form-group input::placeholder { color: #cbd5e1; }

/* ── Clear btn ── */
.clear-btn {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--light);
  font-size: 15px; line-height: 1; padding: 2px; display: none;
  font-family: inherit;
}
.clear-btn.show { display: block; }
.clear-btn:hover { color: var(--danger); }

/* ── Autocomplete dropdown ── */
.autocomplete-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 1000;
  max-height: 240px; overflow-y: auto; display: none;
}
.autocomplete-list.open { display: block; }
.ac-item {
  padding: 8px 12px; font-size: 13px; cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.1s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: #eff6ff; color: var(--blue); }
.ac-item mark { background: none; color: var(--blue); font-weight: 800; }
.ac-count { margin-left: auto; font-size: 11px; color: var(--light); font-weight: 600; white-space: nowrap; }
.ac-empty { padding: 10px 12px; font-size: 13px; color: var(--light); font-style: italic; }

/* ── Actions ── */
.actions-bar { display: flex; gap: 12px; padding: 20px 0 4px; align-items: center; }
.btn-search {
  padding: 11px 36px; background: var(--blue); color: white;
  border: none; border-radius: 10px; font-family: inherit;
  font-size: 15px; font-weight: 800; cursor: pointer; transition: all 0.2s;
}
.btn-search:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
.btn-clear-all {
  background: none; border: 1px solid var(--border); color: var(--mid);
  padding: 9px 20px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 14px;
}
.btn-clear-all:hover { border-color: var(--danger); color: var(--danger); }
.search-hint { font-size: 13px; color: var(--light); margin-left: 4px; font-weight: 600; }

/* ── Results ── */
.results-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.results-header h2 { font-size: 18px; font-weight: 800; }
.result-badge {
  background: #eff6ff; border: 1px solid #bfdbfe;
  color: var(--blue); padding: 3px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
}
.multi-nav { display: flex; gap: 8px; margin-left: auto; align-items: center; }
.nav-btn {
  background: var(--white); border: 1px solid var(--border);
  color: var(--dark); border-radius: 6px; padding: 6px 14px;
  cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 700;
  transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-label { font-size: 13px; color: var(--mid); font-weight: 600; }

/* ── Service card ── */
.service-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  animation: fadeSlide 0.25s ease;
}
@keyframes fadeSlide { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.card-hero {
  background: linear-gradient(135deg, #1e3a5f 0%, #2563EB 60%, #0ea5e9 100%);
  padding: 28px 36px; color: white;
  display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center;
}
.hero-name { font-size: 26px; font-weight: 800; letter-spacing: -0.3px; }
.hero-num  { font-size: 15px; opacity: 0.8; margin-top: 4px; }
.hero-right { text-align: right; }
.hero-plan { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
.hero-fee  { font-size: 28px; font-weight: 800; }

.card-body { display: grid; grid-template-columns: 1fr 1fr; }
.card-section {
  padding: 22px 28px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.card-section:nth-child(even) { border-right: none; }
.card-section.full { grid-column: 1 / -1; border-right: none; }
/* Remove bottom border from last row */
.card-section:last-child { border-bottom: none; }
.card-section:nth-last-child(2):nth-child(odd) { border-bottom: none; }

.section-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; color: var(--light); margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.section-title::before {
  content: ''; display: inline-block; width: 3px; height: 13px;
  background: var(--orange); border-radius: 2px; flex-shrink: 0;
}

.field-list { display: flex; flex-direction: column; gap: 8px; }
.field-row  { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.field-label { font-size: 13px; color: var(--mid); flex-shrink: 0; max-width: 55%; }
.field-value { font-size: 13px; font-weight: 600; text-align: right; word-break: break-all; color: var(--dark); }
.field-value.blue  { color: var(--blue); }
.field-value.green { color: var(--success); }
.field-empty { color: #cbd5e1; }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
}
.pill.yes { background: #d1fae5; color: #065f46; }
.pill.no  { background: #fee2e2; color: #991b1b; }

.usage-chips { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.uc {
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
}
.uc-label { font-size: 10px; color: var(--light); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.uc-val { font-size: 18px; font-weight: 800; color: var(--dark); }
.uc-val.blue  { color: var(--blue); }
.uc-val.green { color: var(--success); }

.no-result {
  text-align: center; padding: 60px 40px;
  background: var(--white); border: 1px solid var(--border); border-radius: 12px;
}
.no-result .icon { font-size: 48px; margin-bottom: 16px; }
.no-result h3   { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.no-result p    { color: var(--mid); font-size: 14px; }

@media (max-width: 800px) {
  .search-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .container { padding: 20px; }
  .app-header { padding: 16px 20px; }
  .search-grid { grid-template-columns: 1fr; }
  .card-body { grid-template-columns: 1fr; }
  .card-section { border-right: none; }
  .card-hero { grid-template-columns: 1fr; }
  .hero-right { text-align: left; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-icon">📱</div>
  <div class="app-header-text">
    <h1>Mobile Service Lookup</h1>
    <p>Upload your Blitz Export and instantly look up any service</p>
  </div>
</div>

<div class="container">

  <!-- Upload section -->
  <div id="upload-section">
    <div class="upload-card" id="uploadZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
      <div class="icon">📂</div>
      <h2>Upload your Blitz Export</h2>
      <p>Drag &amp; drop your XLSX file here, or click to browse</p>
      <span class="btn-primary">Choose File</span>
    </div>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <!-- Search + results -->
  <div id="search-panel">

    <div class="file-pill">
      <span style="font-size:20px">📄</span>
      <div>
        <div class="filename" id="pillName"></div>
        <div class="fileinfo" id="pillInfo"></div>
      </div>
      <button class="btn-reset" onclick="resetAll()">✕ Change File</button>
    </div>

    <div class="config-section">
      <div class="config-section-header">
        <span class="dot"></span>
        Search — type in one or more fields to filter. Smart suggestions appear as you type.
      </div>
      <div class="config-body">
        <div class="search-grid" id="searchGrid"></div>
        <div class="actions-bar">
          <button class="btn-search" onclick="doSearch()">🔍 &nbsp;Search</button>
          <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
          <span class="search-hint" id="searchHint"></span>
        </div>
      </div>
    </div>

    <div id="resultsSection"></div>

  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
let allRows = [];
let indexes = {};
let currentResults = [];
let currentIndex   = 0;

const SEARCH_FIELDS = [
  { key: 'Mobile Number',     label: 'Mobile Number',     icon: '📞' },
  { key: 'User Name',         label: 'User Name',         icon: '👤' },
  { key: 'SIM Number',        label: 'SIM Number',        icon: '💳' },
  { key: 'SIM Serial Number', label: 'SIM Serial Number', icon: '🔢' },
  { key: 'IMEI',              label: 'IMEI',              icon: '📟' },
];

const LOGIC = [
  {n:1,  col:'Customer Name',           type:'include', label:'Customer Name'},
  {n:2,  col:'CIDN',                    type:'include', label:'CIDN'},
  {n:3,  col:'Account Number',          type:'include', label:'Account Number'},
  {n:4,  col:'Mobile Number',           type:'include', label:'Mobile Number'},
  {n:5,  col:'User Name',               type:'include', label:'User Name'},
  {n:6,  col:'Service Activation Date', type:'include', label:'Service Activation Date'},
  {n:7,  col:'Flexiplan Name',          type:'include', label:'Flexiplan Name'},
  {n:8,  col:'Flexiplan Type',          type:'include', label:'Flexiplan Type'},
  {n:9,  type:'calc_flexiplan',         label:'Flexiplan Monthly Fee'},
  {n:10, col:'SIM Number',              type:'include', label:'SIM Number'},
  {n:11, col:'SIM Serial Number',       type:'include', label:'SIM Serial Number'},
  {n:12, col:'IMEI',                    type:'include', label:'IMEI'},
  {n:13, col:'Device Name',             type:'include', label:'Device Name'},
  {n:14, col:'Device Type',             type:'include', label:'Device Type'},
  {n:15, col:'IR Data Pack Description',type:'include', label:'IR Data Pack Description'},
  {n:16, type:'has', label:'Has Used Voice in Past 6 Months',
    cols:['Jan 2026 Domestic Voice Calls','Dec 2025 Domestic Voice Calls','Nov 2025 Domestic Voice Calls','Oct 2025 Domestic Voice Calls','Sep 2025 Domestic Voice Calls','Aug 2025 Domestic Voice Calls']},
  {n:17, type:'has', label:'Has Used Data in Past 6 Months',
    cols:['Jan 2026 Domestic Data Calls','Dec 2025 Domestic Data Calls','Nov 2025 Domestic Data Calls','Oct 2025 Domestic Data Calls','Sep 2025 Domestic Data Calls','Aug 2025 Domestic Data Calls']},
  {n:18, type:'has', label:'Has Used SMS in Past 6 Months',
    cols:['Jan 2026 Domestic SMS','Dec 2025 Domestic SMS','Nov 2025 Domestic SMS','Oct 2025 Domestic SMS','Sep 2025 Domestic SMS','Aug 2025 Domestic SMS']},
  {n:19, type:'total_gb', label:'Total 6 Months Data Usage',
    cols:['Jan 2026 Domestic Data Usage (MB)','Dec 2025 Domestic Data Usage (MB)','Nov 2025 Domestic Data Usage (MB)','Oct 2025 Domestic Data Usage (MB)','Sep 2025 Domestic Data Usage (MB)','Aug 2025 Domestic Data Usage (MB)']},
  {n:20, type:'has', label:'Has Used Roaming in Past 6 Months',
    cols:['Jan 2026 Overseas Data Calls','Dec 2025 Overseas Data Calls','Nov 2025 Overseas Data Calls','Oct 2025 Overseas Data Calls','Sep 2025 Overseas Data Calls','Aug 2025 Overseas Data Calls']},
  {n:21, type:'total_money', label:'Total 6 Months Bill',
    cols:['Bill Total Jan 2026','Bill Total Dec 2025','Bill Total Nov 2025','Bill Total Oct 2025','Bill Total Sep 2025','Bill Total Aug 2025']},
  {n:22, col:'International Roaming Active', type:'direct', label:'International Roaming Active'},
  {n:23, col:'MMS Access',             type:'direct', label:'MMS Active',                        restrict:true},
  {n:24, col:'Bar Outgoing Voice',     type:'direct', label:'Outgoing Voice Barred',              restrict:true},
  {n:25, col:'Bar Outgoing SMS',       type:'direct', label:'Outgoing SMS Barred',                restrict:true},
  {n:26, col:'Bar Incoming SMS',       type:'direct', label:'Incoming SMS Barred',                restrict:true},
  {n:27, col:'Bar Premium SMS',        type:'direct', label:'Premium SMS Barring',                restrict:true},
  {n:28, col:'Bar Video Calls',        type:'direct', label:'Video Calls Barred',                 restrict:true},
  {n:29, col:'Bar Roaming',            type:'direct', label:'Roaming Barred',                     restrict:true},
  {n:30, col:'Bar IDD',                type:'direct', label:'International Direct Dialed Barred', restrict:true},
  {n:31, col:'Network Feature Code',   type:'direct', label:'Network Barring'},
  {n:32, col:'PUK',                    type:'direct', label:'PUK'},
  {n:33, col:'One Number Flag',        type:'direct', label:'One Number Active',                  restrict:true},
  {n:34, col:'Messagebank Prod Desc',  type:'direct', label:'Messagebank Type'},
  {n:35, col:'Last Used Network Date', type:'seen_network', label:'Seen on Network in Last 6 Months'},
];

const SECTIONS = [
  {title:'Account & Service',       items:[1,2,3,4,5,6]},
  {title:'Plan Details',            items:[7,8,9]},
  {title:'Device & SIM',            items:[10,11,12,13,14]},
  {title:'International',           items:[15,20,22]},
  {title:'Usage Summary',           items:[16,17,18,19,21], wide:true},
  {title:'Restrictions & Features', items:[24,25,26,27,28,29,30,31,23,33]},
  {title:'Other Details',           items:[32,34,35]},
];

// ── Upload ────────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  hideError();
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const sheetName = wb.SheetNames.find(n => n.toLowerCase() === 'blitz summary') || wb.SheetNames[0];
      const ws   = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!data.length) { showError('No data found in the "Blitz Summary" sheet.'); return; }
      allRows = data;
      buildIndexes();
      document.getElementById('pillName').textContent = file.name;
      document.getElementById('pillInfo').textContent = `${data.length.toLocaleString()} services · Sheet: ${sheetName}`;
      document.getElementById('upload-section').style.display = 'none';
      document.getElementById('search-panel').style.display   = 'block';
      buildSearchGrid();
    } catch(err) { showError('Failed to read file: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function resetAll() {
  allRows = []; indexes = {};
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('search-panel').style.display   = 'none';
  document.getElementById('resultsSection').innerHTML = '';
  fileInput.value = '';
}

// ── Indexes ───────────────────────────────────────────────────────────────
function buildIndexes() {
  indexes = {};
  SEARCH_FIELDS.forEach(f => {
    const map = new Map();
    allRows.forEach(row => {
      const raw = (row[f.key] || '').toString().trim();
      if (raw) map.set(raw, (map.get(raw) || 0) + 1);
    });
    indexes[f.key] = Array.from(map.entries())
      .map(([val, count]) => ({val, count}))
      .sort((a,b) => a.val.localeCompare(b.val, undefined, {numeric:true}));
  });
}

// ── Search Grid ───────────────────────────────────────────────────────────
function buildSearchGrid() {
  const grid = document.getElementById('searchGrid');
  grid.innerHTML = '';

  SEARCH_FIELDS.forEach(f => {
    const fid = f.key.replace(/ /g,'_');
    const wrap = document.createElement('div');
    wrap.className = 'form-group';
    wrap.innerHTML = `
      <label>${f.label}</label>
      <div class="search-input-wrap">
        <span class="s-icon">${f.icon}</span>
        <input type="text" id="inp_${fid}" placeholder="Type to search…" autocomplete="off" data-field="${f.key}" />
        <button class="clear-btn" id="clr_${fid}" title="Clear">×</button>
      </div>
      <div class="autocomplete-list" id="ac_${fid}"></div>`;
    grid.appendChild(wrap);

    const inp   = wrap.querySelector('input');
    const acEl  = wrap.querySelector('.autocomplete-list');
    const clrBtn= wrap.querySelector('.clear-btn');
    let activeIdx = -1;

    inp.addEventListener('input', () => {
      clrBtn.classList.toggle('show', inp.value.length > 0);
      activeIdx = -1;
      renderAC(f.key, inp, acEl);
      updateHint();
    });
    inp.addEventListener('focus', () => renderAC(f.key, inp, acEl));
    inp.addEventListener('keydown', e => {
      const items = acEl.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        items.forEach((it,i) => it.classList.toggle('active', i === activeIdx));
        items[activeIdx]?.scrollIntoView({block:'nearest'});
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, -1);
        items.forEach((it,i) => it.classList.toggle('active', i === activeIdx));
      } else if (e.key === 'Enter') {
        if (activeIdx >= 0 && items[activeIdx]) {
          selectAC(items[activeIdx].dataset.val, inp, clrBtn, acEl);
        } else {
          closeAC(acEl);
          doSearch();
        }
      } else if (e.key === 'Escape') {
        closeAC(acEl);
      }
    });
    clrBtn.addEventListener('click', () => {
      inp.value = ''; clrBtn.classList.remove('show');
      closeAC(acEl); updateHint();
    });
    document.addEventListener('click', ev => { if (!wrap.contains(ev.target)) closeAC(acEl); });
  });
}

function renderAC(fieldKey, inp, acEl) {
  const q = inp.value.trim().toLowerCase();
  const entries = indexes[fieldKey] || [];
  const filtered = q
    ? entries.filter(e => e.val.toLowerCase().includes(q)).slice(0, 60)
    : entries.slice(0, 60);

  if (!filtered.length) {
    if (q) {
      acEl.innerHTML = `<div class="ac-empty">No matches found</div>`;
      acEl.classList.add('open');
    } else { closeAC(acEl); }
    return;
  }

  acEl.innerHTML = filtered.map(e => {
    const display = q ? hlMatch(e.val, q) : esc(e.val);
    const cnt = e.count > 1 ? `<span class="ac-count">${e.count}</span>` : '';
    return `<div class="ac-item" data-val="${esc(e.val)}">${display}${cnt}</div>`;
  }).join('');

  acEl.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('mousedown', ev => {
      ev.preventDefault();
      selectAC(item.dataset.val, inp, inp.closest('.form-group').querySelector('.clear-btn'), acEl);
    });
  });
  acEl.classList.add('open');
}

function selectAC(val, inp, clrBtn, acEl) {
  inp.value = val;
  clrBtn.classList.add('show');
  closeAC(acEl);
  updateHint();
  doSearch();
}

function closeAC(acEl) { acEl.classList.remove('open'); acEl.innerHTML = ''; }

function hlMatch(val, q) {
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return esc(val).replace(re, m => `<mark>${m}</mark>`);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearAll() {
  SEARCH_FIELDS.forEach(f => {
    const fid = f.key.replace(/ /g,'_');
    const inp = document.getElementById('inp_' + fid);
    const clr = document.getElementById('clr_' + fid);
    const ac  = document.getElementById('ac_'  + fid);
    if (inp) inp.value = '';
    if (clr) clr.classList.remove('show');
    if (ac)  closeAC(ac);
  });
  document.getElementById('resultsSection').innerHTML = '';
  updateHint();
}

function updateHint() {
  const active = SEARCH_FIELDS.filter(f => {
    const inp = document.getElementById('inp_' + f.key.replace(/ /g,'_'));
    return inp && inp.value.trim() !== '';
  }).length;
  document.getElementById('searchHint').textContent =
    active > 0 ? `${active} filter${active > 1 ? 's' : ''} active` : '';
}

// ── Search ────────────────────────────────────────────────────────────────
function doSearch() {
  const filters = SEARCH_FIELDS
    .map(f => ({
      key:   f.key,
      query: (document.getElementById('inp_' + f.key.replace(/ /g,'_'))?.value || '').trim().toLowerCase()
    }))
    .filter(f => f.query !== '');

  if (!filters.length) {
    document.getElementById('resultsSection').innerHTML = ''; return;
  }

  currentResults = allRows.filter(row =>
    filters.every(f => (row[f.key] || '').toString().toLowerCase().includes(f.query))
  );
  currentIndex = 0;
  renderResults();
}

// ── Render ────────────────────────────────────────────────────────────────
function renderResults() {
  const container = document.getElementById('resultsSection');
  if (!currentResults.length) {
    container.innerHTML = `<div class="no-result"><div class="icon">🔎</div><h3>No results found</h3><p>No services matched your search criteria. Try adjusting or clearing some filters.</p></div>`;
    return;
  }

  const row      = currentResults[currentIndex];
  const computed = computeFields(row);
  const byN      = Object.fromEntries(computed.map(c => [c.n, c]));

  const navHtml = currentResults.length > 1 ? `
    <div class="multi-nav">
      <button class="nav-btn" onclick="navigate(-1)" ${currentIndex===0?'disabled':''}>← Prev</button>
      <span class="nav-label">${currentIndex+1} of ${currentResults.length}</span>
      <button class="nav-btn" onclick="navigate(1)"  ${currentIndex===currentResults.length-1?'disabled':''}>Next →</button>
    </div>` : '';

  let bodyHtml = '';
  for (const sec of SECTIONS) {
    const fields = sec.items.map(n => byN[n]).filter(Boolean);
    if (!fields.length) continue;
    let inner = '';

    if (sec.wide) {
      inner = `<div class="usage-chips">` + fields.map(f => {
        let valHtml;
        if (f.format === 'pill') {
          valHtml = `<span class="pill ${f.value==='Yes'?'yes':'no'}">${f.value}</span>`;
        } else if (f.format === 'gb') {
          valHtml = `<div class="uc-val blue">${f.value}</div>`;
        } else if (f.format === 'money') {
          valHtml = `<div class="uc-val green">${f.value}</div>`;
        } else {
          valHtml = `<div class="uc-val">${f.value || '—'}</div>`;
        }
        const isChipVal = f.format !== 'pill';
        return `<div class="uc"><div class="uc-label">${f.label}</div>${
          f.format === 'pill'
            ? `<div style="margin-top:6px">${valHtml}</div>`
            : valHtml
        }</div>`;
      }).join('') + `</div>`;
    } else {
      inner = `<div class="field-list">` + fields.map(f => {
        let valHtml;
        if (f.format === 'pill') {
          valHtml = `<span class="pill ${f.value==='Yes'?'yes':'no'}">${f.value}</span>`;
        } else if (f.format === 'money') {
          valHtml = `<span class="field-value green">${f.value}</span>`;
        } else if (f.format === 'highlight') {
          valHtml = `<span class="field-value blue">${f.value}</span>`;
        } else {
          valHtml = f.value
            ? `<span class="field-value">${esc(f.value)}</span>`
            : `<span class="field-value field-empty">—</span>`;
        }
        return `<div class="field-row"><span class="field-label">${f.label}</span>${valHtml}</div>`;
      }).join('') + `</div>`;
    }

    bodyHtml += `<div class="card-section${sec.wide?' full':''}">
      <div class="section-title">${sec.title}</div>${inner}</div>`;
  }

  container.innerHTML = `
    <div class="results-header">
      <h2>Service Details</h2>
      <span class="result-badge">${currentResults.length} result${currentResults.length!==1?'s':''}</span>
      ${navHtml}
    </div>
    <div class="service-card">
      <div class="card-hero">
        <div>
          <div class="hero-name">${esc(byN[5]?.value || '—')}</div>
          <div class="hero-num">${esc(byN[4]?.value  || '')}</div>
        </div>
        <div class="hero-right">
          <div class="hero-plan">${esc(byN[7]?.value  || '—')}</div>
          <div class="hero-fee">${esc(byN[9]?.value   || '')}</div>
        </div>
      </div>
      <div class="card-body">${bodyHtml}</div>
    </div>`;
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(currentResults.length - 1, currentIndex + dir));
  renderResults();
  window.scrollTo({top: document.getElementById('resultsSection').offsetTop - 20, behavior:'smooth'});
}

// ── Compute ───────────────────────────────────────────────────────────────
function sentenceCase(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

function computeFields(row) {
  return LOGIC.map(item => {
    let value = '', format = 'text';
    if (item.type === 'include') {
      value = fmtVal(row[item.col]);
      if (item.n === 4) format = 'highlight';
    } else if (item.type === 'direct') {
      if (item.n === 22) {
        // International Roaming Active: YES only if field=YES AND Network Feature Code=0 - UNRESTRICTED
        const roaming = (row['International Roaming Active'] || '').toString().trim().toLowerCase();
        const network = (row['Network Feature Code'] || '').toString().trim().toLowerCase();
        value = (roaming === 'yes' && network === '0 - unrestricted') ? 'Yes' : 'No';
        format = 'pill';
      } else {
        value = fmtVal(row[item.col]);
        // Sentence-case Yes/No values in Restrictions & Features fields
        if (item.restrict) {
          value = sentenceCase(value);
        }
      }
    } else if (item.type === 'seen_network') {
      // Yes if Last Used Network Date is within 6 months of today (date only, ignore time)
      const raw = row[item.col];
      let dateVal = null;
      if (raw instanceof Date) {
        dateVal = raw;
      } else if (raw && raw !== '') {
        dateVal = new Date(raw);
      }
      if (dateVal && !isNaN(dateVal.getTime())) {
        const today = new Date();
        // Strip time from both dates for a pure date comparison
        const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const seenDate  = new Date(dateVal.getFullYear(), dateVal.getMonth(), dateVal.getDate());
        const sixMonthsAgo = new Date(todayDate);
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
        value = seenDate >= sixMonthsAgo ? 'Yes' : 'No';
      } else {
        value = 'No';
      }
      format = 'pill';
    } else if (item.type === 'has') {
      const tot = item.cols.reduce((s,c) => s + (parseFloat(row[c])||0), 0);
      value = tot > 0 ? 'Yes' : 'No'; format = 'pill';
    } else if (item.type === 'total_gb') {
      const mb = item.cols.reduce((s,c) => s + (parseFloat(row[c])||0), 0);
      value = (mb/1024).toFixed(2) + ' GB'; format = 'gb';
    } else if (item.type === 'total_money') {
      const t = item.cols.reduce((s,c) => s + (parseFloat(row[c])||0), 0);
      value = '$' + t.toFixed(2); format = 'money';
    } else if (item.type === 'calc_flexiplan') {
      const base    = parseFloat(row['Flexiplan Monthly Fee'])||0;
      const care    = parseFloat(row['Latest Active Adaptive Mobility Care (AMSCARE1) Bill Amount'])||0;
      const pet     = parseFloat(row['Total Adaptive Flexiplan PET Discount Amount ($)'])||0;
      const mobcare = parseFloat(row['Total Adaptive Mobility Care Discount Amount ($)'])||0;
      value = '$' + (base + care + pet + mobcare).toFixed(2); format = 'money';
    }
    return { n: item.n, label: item.label, value, format };
  });
}

function fmtVal(val) {
  if (val === null || val === undefined || val === '') return '';
  if (val instanceof Date) return val.toLocaleDateString('en-AU');
  return val.toString();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
